<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitmentOS V5 🚀</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.css">
<script src="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.js"></script>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#0f172a;
  color:#e2e8f0;
}

header {
  background:#111827;
  padding:12px 20px;
  font-size:20px;
}

.tabs { display:flex; background:#1e293b; }
.tab { padding:10px 16px; cursor:pointer; color:#94a3b8; }
.tab.active { color:#fff; border-bottom:2px solid #3b82f6; }

.pane { display:none; padding:15px; }
.pane.active { display:block; }

button {
  padding:6px 12px;
  margin:5px;
  background:#3b82f6;
  border:none;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}

input {
  padding:6px;
  margin:5px;
  border-radius:5px;
  border:none;
}

.status-new { color:#22c55e; }
.status-updated { color:#f59e0b; }
.status-existing { color:#94a3b8; }

.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#1e293b;
  padding:10px;
  border-radius:5px;
}
</style>
</head>

<body>

<header>FitmentOS V5 🚀</header>

<div class="tabs">
  <div class="tab active" onclick="tab('links')">Links</div>
  <div class="tab" onclick="tab('fit')">Fitments</div>
  <div class="tab" onclick="tab('exist')">Existing</div>
  <div class="tab" onclick="tab('out')">Output</div>
</div>

<div id="links" class="pane active">
  <button onclick="addRow(linksHot)">Add Row</button>
  <div id="linksGrid"></div>
</div>

<div id="fit" class="pane">
  <button onclick="addRow(fitHot)">Add Row</button>
  <div id="fitGrid"></div>
</div>

<div id="exist" class="pane">
  <button onclick="saveAll()">Save</button>
  <div id="existGrid"></div>
</div>

<div id="out" class="pane">
  <button onclick="runMerge()">Run Merge</button>
  <button onclick="applyUpdates()">Apply Updates</button>
  <button onclick="exportCSV()">Export CSV</button>

  <input placeholder="Search..." oninput="search(this.value)">

  <div id="outGrid"></div>
</div>

<script>

// TAB
function tab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[onclick="tab('${name}')"]`).classList.add('active');
  document.getElementById(name).classList.add('active');
}

// HELPERS
const clean=v=>String(v||'').trim();
const key=(y,mk,mo,e)=>[y,mk,mo,e].map(clean).join('|').toLowerCase();

// LINKS
const linksHot = new Handsontable(document.getElementById('linksGrid'), {
  data: JSON.parse(localStorage.getItem('links')||'[["",""]]'),
  colHeaders:['Link','ID'],
  columns:[{}, {readOnly:true}],
  rowHeaders:true,
  licenseKey:'non-commercial-and-evaluation',
  afterChange(c,s){
    if(!c||s==='loadData'||s==='auto') return;
    c.forEach(([r,col,ov,nv])=>{
      if(col===0){
        const m = clean(nv).match(/post=(\d+)/);
        this.setDataAtCell(r,1,m?m[1]:'','auto');
      }
    });
    saveAll();
  }
});

// FITMENTS
const fitHot = new Handsontable(document.getElementById('fitGrid'), {
  data: JSON.parse(localStorage.getItem('fit')||'[["","","",""]]'),
  colHeaders:['Year','Make','Model','Engine'],
  rowHeaders:true,
  licenseKey:'non-commercial-and-evaluation',
  afterChange(){ saveAll(); }
});

// EXISTING
const existHot = new Handsontable(document.getElementById('existGrid'), {
  data: JSON.parse(localStorage.getItem('exist')||'[["","","","","",""]]'),
  colHeaders:['ID','Year','Make','Model','Engine','Product IDs'],
  rowHeaders:true,
  licenseKey:'non-commercial-and-evaluation',
  afterChange(){ saveAll(); }
});

// OUTPUT
let outData = [];

const outHot = new Handsontable(document.getElementById('outGrid'), {
  data:[],
  colHeaders:['ID','Year','Make','Model','Engine','Product IDs','Status'],
  rowHeaders:true,
  licenseKey:'non-commercial-and-evaluation',
  cells(r,c){
    const cp={};
    const val=this.instance.getDataAtCell(r,6);
    if(val==='NEW') cp.className='status-new';
    if(val==='UPDATED') cp.className='status-updated';
    if(val==='EXISTING') cp.className='status-existing';
    return cp;
  }
});

// SAVE
function saveAll(){
  localStorage.setItem('links', JSON.stringify(linksHot.getData()));
  localStorage.setItem('fit', JSON.stringify(fitHot.getData()));
  localStorage.setItem('exist', JSON.stringify(existHot.getData()));
  toast("Saved ✔️");
}

// ADD ROW
function addRow(h){ h.alter('insert_row'); }

// MERGE
function runMerge(){
  const ids=[...new Set(linksHot.getData().map(r=>clean(r[1])).filter(Boolean))];
  const idStr=ids.join('|');

  const exist = existHot.getData().filter(r=>r.some(x=>clean(x)));
  const map={}; let max=0;

  exist.forEach(r=>{
    const [id,y,mk,mo,e,p]=r.map(clean);
    const k=key(y,mk,mo,e);
    map[k]={id:Number(id)||0,p};
    if(Number(id)>max) max=Number(id);
  });

  let next=max;
  outData=[];

  fitHot.getData().forEach(r=>{
    const [y,mk,mo,e]=r.map(clean);
    if(!e) return;
    const k=key(y,mk,mo,e);

    if(map[k]){
      const merged=[...new Set([...map[k].p.split('|'),...ids])].join('|');
      const status=merged===map[k].p?'EXISTING':'UPDATED';
      outData.push([map[k].id,y,mk,mo,e,merged,status]);
    } else {
      next++;
      outData.push([next,y,mk,mo,e,idStr,'NEW']);
    }
  });

  outHot.loadData(outData);
  toast("Merge complete 🚀");
}

// APPLY UPDATES 🔥
function applyUpdates(){
  if(!outData.length) return alert("Run merge first!");

  const existing = existHot.getData().filter(r=>r.some(x=>clean(x)));

  outData.forEach(row=>{
    const [id,y,mk,mo,e,p,status]=row;

    if(status==='UPDATED'){
      const index = existing.findIndex(r=>Number(r[0])===id);
      if(index>-1) existing[index]=[id,y,mk,mo,e,p];
    }

    if(status==='NEW'){
      existing.push([id,y,mk,mo,e,p]);
    }
  });

  existHot.loadData(existing);
  saveAll();
  toast("Applied updates ✔️");
}

// SEARCH 🔍
function search(q){
  const filtered = outData.filter(r=>r.join(' ').toLowerCase().includes(q.toLowerCase()));
  outHot.loadData(filtered);
}

// EXPORT
function exportCSV(){
  const csv = outData.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='output.csv';
  a.click();
}

// TOAST
function toast(msg){
  const t=document.createElement('div');
  t.className='toast';
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

</script>

</body>
</html>
