<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitmentOS v3</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.css">
<script src="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.js"></script>

<style>
body {
  background:#0f172a;
  color:#e2e8f0;
  font-family:Arial;
  margin:0;
}

.tabs {
  display:flex;
  background:#1e293b;
}

.tab {
  padding:12px 20px;
  cursor:pointer;
}

.tab.active {
  background:#334155;
}

.pane {
  display:none;
  padding:15px;
}

.pane.active {
  display:block;
}

button {
  padding:6px 12px;
  margin:5px;
  cursor:pointer;
}

.status-new { color:#22c55e; font-weight:bold; }
.status-updated { color:#f59e0b; font-weight:bold; }
.status-existing { color:#94a3b8; }
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="switchTab('links')">Links</div>
  <div class="tab" onclick="switchTab('fitments')">Fitments</div>
  <div class="tab" onclick="switchTab('existing')">Existing</div>
  <div class="tab" onclick="switchTab('output')">Output</div>
</div>

<div id="links" class="pane active">
  <button onclick="addLinkRow()">Add Row</button>
  <div id="linksGrid"></div>
</div>

<div id="fitments" class="pane">
  <button onclick="addFitmentRow()">Add Row</button>
  <div id="fitmentsGrid"></div>
</div>

<div id="existing" class="pane">
  <input type="file" onchange="loadCSV(event)">
  <button onclick="saveExisting()">Save</button>
  <div id="existingGrid"></div>
</div>

<div id="output" class="pane">
  <button onclick="runMerge()">Run Merge</button>
  <div id="outputGrid"></div>
</div>

<script>

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));

  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(name).classList.add('active');
}

function clean(v){ return String(v||'').trim(); }

function extract(url){
  const m = clean(url).match(/post=(\d+)/);
  return m?m[1]:'';
}

function key(y,mk,mo,e){
  return [y,mk,mo,e].map(clean).join('|').toLowerCase();
}

// LINKS
const linksHot = new Handsontable(document.getElementById('linksGrid'), {
  data:[['','']],
  colHeaders:['Link','Product ID'],
  columns:[{},{readOnly:true}],
  rowHeaders:true,
  licenseKey:'non-commercial-and-evaluation',

  afterChange(c,s){
    if(!c || s==='loadData' || s==='auto') return;
    c.forEach(([r,col,ov,nv])=>{
      if(col===0){
        this.setDataAtCell(r,1,extract(nv),'auto');
      }
    });
  }
});

function addLinkRow(){ linksHot.alter('insert_row'); }

// FITMENTS
const fitHot = new Handsontable(document.getElementById('fitmentsGrid'), {
  data:[['','','','']],
  colHeaders:['Year','Make','Model','Engine'],
  rowHeaders:true,
  licenseKey:'non-commercial-and-evaluation'
});

function addFitmentRow(){ fitHot.alter('insert_row'); }

// EXISTING
const existHot = new Handsontable(document.getElementById('existingGrid'), {
  data:[['','','','','','']],
  colHeaders:['ID','Year','Make','Model','Engine','Product IDs'],
  rowHeaders:true,
  licenseKey:'non-commercial-and-evaluation'
});

function saveExisting(){
  localStorage.setItem('existing', JSON.stringify(existHot.getData()));
  alert('Saved');
}

function loadExisting(){
  const d = JSON.parse(localStorage.getItem('existing')||'[]');
  if(d.length) existHot.loadData(d);
}

function loadCSV(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(ev){
    const rows = ev.target.result.split('\n').map(r=>r.split(','));
    existHot.loadData(rows);
  }
  reader.readAsText(file);
}

// OUTPUT
const outHot = new Handsontable(document.getElementById('outputGrid'), {
  data:[],
  colHeaders:['ID','Year','Make','Model','Engine','Product IDs','Status'],
  rowHeaders:true,
  licenseKey:'non-commercial-and-evaluation',

  cells(r,c){
    const cp = {};
    if(c===6){
      const val = this.instance.getDataAtCell(r,c);
      if(val==='NEW') cp.className='status-new';
      if(val==='UPDATED') cp.className='status-updated';
      if(val==='EXISTING') cp.className='status-existing';
    }
    return cp;
  }
});

// MERGE
function runMerge(){

  const ids = [...new Set(
    linksHot.getData().map(r=>clean(r[1])).filter(Boolean)
  )];

  const idStr = ids.join('|');

  const existing = existHot.getData().filter(r=>r.some(x=>clean(x)));
  const map = {};
  let maxId = 0;

  existing.forEach(r=>{
    const [id,y,mk,mo,e,p] = r.map(clean);
    const k = key(y,mk,mo,e);
    map[k]={id:Number(id)||0,p};
    if(Number(id)>maxId) maxId=Number(id);
  });

  let nextId = maxId;
  const out = [];

  fitHot.getData().forEach(r=>{
    const [y,mk,mo,e]=r.map(clean);
    if(!e) return;

    const k = key(y,mk,mo,e);

    if(map[k]){
      const old = map[k].p.split('|');
      const merged = [...new Set([...old,...ids])].join('|');
      const status = merged===map[k].p?'EXISTING':'UPDATED';

      out.push([map[k].id,y,mk,mo,e,merged,status]);
    } else {
      nextId++;
      out.push([nextId,y,mk,mo,e,idStr,'NEW']);
    }
  });

  outHot.loadData(out);
}

loadExisting();

</script>

</body>
</html>
