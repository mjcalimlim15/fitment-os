<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitmentOS PRO</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.css">
<script src="https://cdn.jsdelivr.net/npm/handsontable@14.5.0/dist/handsontable.full.min.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0b1220;
  color:#e2e8f0;
}

header {
  padding:14px 20px;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
  display:flex;
  justify-content:space-between;
}

.tabs {
  display:flex;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
}

.tab {
  padding:12px 18px;
  cursor:pointer;
  color:#94a3b8;
}

.tab.active {
  color:#fff;
  border-bottom:2px solid #3b82f6;
}

.pane {
  display:none;
  padding:20px;
}

.pane.active {
  display:block;
}

.grid-box {
  background:#111827;
  border:1px solid #1f2937;
  border-radius:8px;
  padding:10px;
  height:400px;
}

button {
  padding:6px 12px;
  background:#3b82f6;
  border:none;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

button:hover {
  background:#2563eb;
}

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

</style>
</head>

<body>

<header>
  <div>FitmentOS 🚀</div>
  <div>LocalStorage Ready</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('links')">Links</div>
  <div class="tab" onclick="switchTab('fit')">Fitments</div>
  <div class="tab" onclick="switchTab('exist')">Existing</div>
  <div class="tab" onclick="switchTab('out')">Output</div>
</div>

<!-- LINKS -->
<div id="links" class="pane active">
  <div class="topbar">
    <button onclick="addRow(linksHot)">+ Add Row</button>
  </div>
  <div class="grid-box">
    <div id="linksGrid"></div>
  </div>
</div>

<!-- FITMENTS -->
<div id="fit" class="pane">
  <div class="topbar">
    <button onclick="addRow(fitHot)">+ Add Row</button>
  </div>
  <div class="grid-box">
    <div id="fitGrid"></div>
  </div>
</div>

<!-- EXISTING -->
<div id="exist" class="pane">
  <div class="topbar">
    <button onclick="save()">💾 Save</button>
  </div>
  <div class="grid-box">
    <div id="existGrid"></div>
  </div>
</div>

<!-- OUTPUT -->
<div id="out" class="pane">
  <div class="topbar">
    <button onclick="runMerge()">⚡ Run Merge</button>
    <button onclick="applyUpdates()">✔ Apply Updates</button>
  </div>
  <div class="grid-box">
    <div id="outGrid"></div>
  </div>
</div>

<script>

// TAB
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));

  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(name).classList.add('active');

  setTimeout(()=> {
    linksHot.render();
    fitHot.render();
    existHot.render();
    outHot.render();
  }, 50);
}

// HELPERS
const clean = v => String(v||'').trim();
const key = (y,mk,mo,e)=>[y,mk,mo,e].map(clean).join('|').toLowerCase();

// LINKS (FIXED)
const linksHot = new Handsontable(document.getElementById('linksGrid'), {
  data:[['','']],
  colHeaders:['Link','Product ID'],
  columns:[
    {type:'text'},
    {type:'text', readOnly:true}
  ],
  rowHeaders:true,
  stretchH:'all',
  contextMenu:true,
  licenseKey:'non-commercial-and-evaluation',

  afterChange(changes, source){
    if (!changes || source === 'loadData' || source === 'auto') return;

    changes.forEach(([row, col, oldVal, newVal]) => {
      if (col === 0) {
        const match = clean(newVal).match(/post=(\d+)/);
        const id = match ? match[1] : '';
        this.setDataAtCell(row, 1, id, 'auto');
      }
    });
  }
});

// FITMENTS
const fitHot = new Handsontable(document.getElementById('fitGrid'), {
  data:[['','','','']],
  colHeaders:['Year','Make','Model','Engine'],
  rowHeaders:true,
  stretchH:'all',
  contextMenu:true,
  licenseKey:'non-commercial-and-evaluation'
});

// EXISTING
const existHot = new Handsontable(document.getElementById('existGrid'), {
  data:[['','','','','','']],
  colHeaders:['ID','Year','Make','Model','Engine','Product IDs'],
  rowHeaders:true,
  stretchH:'all',
  contextMenu:true,
  licenseKey:'non-commercial-and-evaluation'
});

// OUTPUT
let outData = [];

const outHot = new Handsontable(document.getElementById('outGrid'), {
  data:[],
  colHeaders:['ID','Year','Make','Model','Engine','Product IDs','Status'],
  rowHeaders:true,
  stretchH:'all',
  licenseKey:'non-commercial-and-evaluation'
});

// ADD ROW
function addRow(h){ h.alter('insert_row'); }

// SAVE
function save(){
  localStorage.setItem('exist', JSON.stringify(existHot.getData()));
  alert('Saved ✔️');
}

// MERGE
function runMerge(){
  const ids = [...new Set(
    linksHot.getData().map(r=>clean(r[1])).filter(Boolean)
  )];

  const idStr = ids.join('|');

  const existing = existHot.getData().filter(r=>r.some(x=>clean(x)));
  const map = {};
  let max = 0;

  existing.forEach(r=>{
    const [id,y,mk,mo,e,p]=r.map(clean);
    const k = key(y,mk,mo,e);
    map[k]={id:Number(id)||0,p};
    if(Number(id)>max) max=Number(id);
  });

  let next=max;
  outData=[];

  fitHot.getData().forEach(r=>{
    const [y,mk,mo,e]=r.map(clean);
    if(!e) return;

    const k=key(y,mk,mo,e);

    if(map[k]){
      const merged=[...new Set([...map[k].p.split('|'),...ids])].join('|');
      const status=merged===map[k].p?'EXISTING':'UPDATED';
      outData.push([map[k].id,y,mk,mo,e,merged,status]);
    } else {
      next++;
      outData.push([next,y,mk,mo,e,idStr,'NEW']);
    }
  });

  outHot.loadData(outData);
}

// APPLY
function applyUpdates(){
  const existing = existHot.getData().filter(r=>r.some(x=>clean(x)));

  outData.forEach(row=>{
    const [id,y,mk,mo,e,p,status]=row;

    if(status==='UPDATED'){
      const i = existing.findIndex(r=>Number(r[0])===id);
      if(i>-1) existing[i]=[id,y,mk,mo,e,p];
    }

    if(status==='NEW'){
      existing.push([id,y,mk,mo,e,p]);
    }
  });

  existHot.loadData(existing);
  save();
}

</script>

</body>
</html>
